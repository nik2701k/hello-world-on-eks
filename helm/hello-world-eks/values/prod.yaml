replicaCount: 1

image:
  repository: 826784631306.dkr.ecr.ap-south-1.amazonaws.com/hello-world
  tag: "5f9aaf5"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 2
    timeoutSeconds: 2
    periodSeconds: 15
    failureThreshold: 3
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    timeoutSeconds: 2
    periodSeconds: 10
    failureThreshold: 3
  startup:
    path: /healthz
    initialDelaySeconds: 0
    timeoutSeconds: 2
    periodSeconds: 5
    failureThreshold: 30

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: null
  maxUnavailable: 1
